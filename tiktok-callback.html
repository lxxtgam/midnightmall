<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIDNIGHT MALL — TikTok authorization</title>
<style>
  body{font-family:system-ui,sans-serif;background:#120b2e;color:#efeaff;
       max-width:640px;margin:0 auto;padding:56px 24px;line-height:1.7;text-align:center}
  h1{color:#ff71ce} #msg{color:#b9aee0}
  textarea{width:100%;height:120px;margin-top:18px;border-radius:12px;
    border:2px solid #b967ff;background:rgba(255,255,255,.06);color:#efeaff;
    padding:14px;font-family:monospace;font-size:.9rem;word-break:break-all}
  button{margin-top:14px;padding:12px 26px;border:0;border-radius:999px;
    font-weight:700;cursor:pointer;background:linear-gradient(90deg,#ff71ce,#b967ff);
    color:#fff}
  .ok{color:#05ffa1}
</style>
</head>
<body>
<h1>TikTok authorization</h1>
<p id="msg">Reading authorization code…</p>
<textarea id="code" readonly placeholder="(no code found in the URL)"></textarea>
<button onclick="copyCode()">Copy code</button>
<script>
  var p = new URLSearchParams(location.search);
  var code = p.get("code"), err = p.get("error");
  var msg = document.getElementById("msg"), box = document.getElementById("code");
  if (code) {
    box.value = code;
    msg.innerHTML = "<span class='ok'>Got it.</span> Copy this code and paste it back to Jarvis:";
  } else if (err) {
    msg.textContent = "Authorization failed: " + err + " — " + (p.get("error_description") || "");
  } else {
    msg.textContent = "No authorization code in the URL.";
  }
  function copyCode() {
    box.select(); document.execCommand("copy");
    msg.innerHTML = "<span class='ok'>Copied.</span> Paste it to Jarvis.";
  }
</script>
</body>
</html>
